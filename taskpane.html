<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Box Link Checker</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <script>
        // Office.jsの初期化
        Office.onReady(function (info) {
            // 初期化完了
        });

        // 送信ボタンが押されたときに実行される関数
        function checkBodyOnSend(event) {
            // メールの本文（テキスト）を非同期で取得
            Office.context.mailbox.item.body.getAsync(
                "text",
                { asyncContext: event },
                function (asyncResult) {
                    var event = asyncResult.asyncContext;

                    if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
                        var bodyText = asyncResult.value.toLowerCase(); // 小文字化

                        // "box.com" が含まれているかチェック
                        if (bodyText.indexOf("box.com") !== -1) {
                            // 含まれている場合：送信をブロックし、上部にエラーメッセージを表示
                            event.completed({ 
                                allowEvent: false, 
                                errorMessage: "【セキュリティ警告】Boxのリンクが含まれています。アクセス権限を確認するか、リンクを削除してから再送信してください。" 
                            });
                        } else {
                            // 含まれていない場合：そのまま送信を許可
                            event.completed({ allowEvent: true });
                        }
                    } else {
                        // 取得エラー時はとりあえず送信を許可
                        event.completed({ allowEvent: true });
                    }
                }
            );
        }

        // 関数をイベントに関連付け（必須）
        Office.actions.associate("checkBodyOnSend", checkBodyOnSend);
    </script>
</head>
<body>
    </body>
</html>
